    <!-- This is a simple clicker game where the user clicks a button to increase their score. 
         The score is displayed on the page and can be reset with a reset button. -->
    <div class="button" id="click-area">
        <h1>Click me</h1>
        <p id="click-count">0</p>
        <button id="reset-btn" class="reset-button">Reset</button>
    </div>

    <div id="image-container"></div>

</body>
